<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BamFu - Sustainable Bamboo Solutions">
    <title>BamFu - Sustainable Bamboo Solutions 🐼</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ========== NAVBAR ========== -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="panda-logo">🐼</span>
                <span class="brand-name">BamFu</span>
            </div>
            <button class="contact-btn">Contact Us</button>
        </div>
    </nav>

    <!-- ========== HERO SECTION ========== -->
    <section class="hero">
        <div class="hero-container">
            <!-- Left side - Empty space -->
            <div class="hero-left"></div>

            <!-- Right side - Image with text overlay -->
            <div class="hero-right">
                <div class="hero-image-wrapper">
                    <div class="hero-image">
                        <svg class="panda-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                            <!-- Panda Body -->
                            <circle cx="100" cy="130" r="50" fill="#ffffff"/>
                            
                            <!-- Panda Head -->
                            <circle cx="100" cy="70" r="45" fill="#ffffff"/>
                            
                            <!-- Left Eye Patch -->
                            <ellipse cx="80" cy="55" rx="18" ry="25" fill="#000000"/>
                            
                            <!-- Right Eye Patch -->
                            <ellipse cx="120" cy="55" rx="18" ry="25" fill="#000000"/>
                            
                            <!-- Left Eye -->
                            <circle cx="80" cy="55" r="8" fill="#ffffff"/>
                            <circle cx="82" cy="53" r="4" fill="#000000"/>
                            
                            <!-- Right Eye -->
                            <circle cx="120" cy="55" r="8" fill="#ffffff"/>
                            <circle cx="122" cy="53" r="4" fill="#000000"/>
                            
                            <!-- Nose -->
                            <circle cx="100" cy="75" r="6" fill="#000000"/>
                            
                            <!-- Mouth -->
                            <path d="M 100 75 Q 95 85 90 82" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round"/>
                            <path d="M 100 75 Q 105 85 110 82" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round"/>
                            
                            <!-- Left Ear -->
                            <circle cx="70" cy="35" r="12" fill="#000000"/>
                            
                            <!-- Right Ear -->
                            <circle cx="130" cy="35" r="12" fill="#000000"/>
                            
                            <!-- Left Arm -->
                            <ellipse cx="65" cy="115" rx="12" ry="35" fill="#000000"/>
                            
                            <!-- Right Arm -->
                            <ellipse cx="135" cy="115" rx="12" ry="35" fill="#000000"/>
                            
                            <!-- Left Leg -->
                            <ellipse cx="75" cy="165" rx="15" ry="20" fill="#000000"/>
                            
                            <!-- Right Leg -->
                            <ellipse cx="125" cy="165" rx="15" ry="20" fill="#000000"/>
                            
                            <!-- Bamboo stalks in background -->
                            <line x1="40" y1="20" x2="40" y2="80" stroke="#52b788" stroke-width="3"/>
                            <ellipse cx="38" cy="30" rx="3" ry="5" fill="#52b788"/>
                            <ellipse cx="42" cy="45" rx="3" ry="5" fill="#52b788"/>
                            
                            <line x1="160" y1="40" x2="160" y2="100" stroke="#2d6a4f" stroke-width="4"/>
                            <ellipse cx="158" cy="50" rx="3" ry="6" fill="#2d6a4f"/>
                            <ellipse cx="162" cy="70" rx="3" ry="6" fill="#2d6a4f"/>
                        </svg>
                    </div>

                    <!-- BamFu Text Overlay with Image Cutout -->
                    <div class="hero-text-overlay">
                        <div class="bamfu-text">
                            <span class="text-letter" style="background-image: url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 60%22><text x=%2220%22 y=%2245%22 font-size=%2250%22 fill=%22%23000%22>B</text></svg>')">B</span><span class="text-letter">a</span><span class="text-letter">m</span><span class="text-letter">F</span><span class="text-letter">u</span>
                        </div>
                    </div>
                </div>

                <!-- Time Display -->
                <div class="time-display">
                    <div class="time" id="time">9:41 AM</div>
                    <div class="date" id="date">Jun 5, 2023</div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
